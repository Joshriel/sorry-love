<!DOCTYPE html>
<html>
<head>
  <title>Just one question...</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Poppins, sans-serif;
      background: linear-gradient(to bottom, #ffe6f0, #ffd6eb);
      overflow: hidden;
    }

    .page-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .text-container {
      position: relative;
      background: linear-gradient(to bottom, #ffe6f0, #ffd6eb);
      padding: 40px 60px;
      text-align: center;
      z-index: 10;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      border-radius: 0; /* removed border radius */
    }

    h1 {
      color: #ff3385;
      font-size: 2em;
      margin: 0 0 30px 0;
    }

    .button-container {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    #yesBtn {
      background-color: #4CAF50;
      color: white;
    }
    #yesBtn:hover { transform: scale(1.1); }

    #noBtn {
      background-color: #ff4d4d;
      color: white;
    }

    /* Full-page image grid */
    .image-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-wrap: wrap;
      z-index: 5;
    }

    .image-grid img {
      width: calc(100% / 5); /* 5 images per row */
      height: calc(100% / 5); /* adjust for rows */
      object-fit: cover;
      margin: 0; /* no gaps */
      border-radius: 0; /* no rounding */
    }

    @media (max-width: 600px) {
      h1 { font-size: 4em; margin-bottom: 20px; }
      button { font-size: 24px; padding: 12px 20px; }
      .image-grid img { width: calc(100% / 3); height: calc(100% / 3); }
    }
  </style>
</head>
<body>

  <div class="page-container">
    <div class="text-container" id="textContainer">
      <h1 id="question">Do you forgive me? 💔</h1>
      <div class="button-container">
        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No 😢</button>
      </div>
    </div>

    <div class="image-grid" id="imageGrid"></div>
  </div>

  <script>
    const question = document.getElementById("question");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const imageGrid = document.getElementById("imageGrid");

    const images = [
      "https://raw.githubusercontent.com/Joshriel/forgive/main/WhatsApp%20Image%202026-03-31%20at%2010.23.07%20(1).jpeg",
      "https://i.imgur.com/jQ9XQ0P.png",
      "https://i.imgur.com/Z7AzH2c.png"
    ];

    let stage = 0;

    yesBtn.onclick = function() {
      question.innerText = "I love you bbe ❤️🥺";
      document.querySelector('.button-container').style.display = "none";

      fillImageGrid();
    };

    noBtn.onclick = function() {
      if (stage === 0) {
        question.innerText = "Are you sure? 😢";
        stage = 1;
      } else {
        question.innerText = "Please, think again 😢";
      }
    };

    function fillImageGrid() {
      const rows = 5; // adjust rows
      const cols = 5; // adjust cols

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const img = document.createElement("img");
          img.src = images[Math.floor(Math.random() * images.length)];
          imageGrid.appendChild(img);
        }
      }
    }
  </script>

</body>
</html>
