<!DOCTYPE html>
<html>
<head>
  <title>Just one question...</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Poppins, sans-serif;
      background: linear-gradient(to bottom, #ffe6f0, #ffd6eb);
      overflow: hidden;
    }

    /* Full-page container */
    .page-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Text container */
    .text-container {
      position: relative;
      background: linear-gradient(to bottom, #ffe6f0, #ffd6eb); /* same as body */
      padding: 40px 60px;
      border-radius: 20px;
      text-align: center;
      z-index: 10; /* above images */
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }

    h1 {
      color: #ff3385;
      font-size: 5.2em;
      margin: 0 0 30px 0;
      word-wrap: break-word;
    }

    /* Buttons */
    .button-container {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    button {
      padding: 12px 25px;
      font-size: 50px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    #yesBtn {
      background-color: #4CAF50;
      color: white;
    }
    #yesBtn:hover {
      transform: scale(1.1);
    }

    #noBtn {
      background-color: #ff4d4d;
      color: white;
    }

    /* Floating images around text */
    .float-img {
      position: absolute;
      width: 100px;
      border-radius: 10px;
      z-index: 5;
      transition: transform 0.3s ease-in-out;
    }

    /* Mobile adjustments */
    @media (max-width: 600px) {
      h1 {
        font-size: 6em;
        margin-bottom: 30px;
      }
      button {
        font-size: 28px;
        padding: 15px 30px;
      }
      .float-img {
        width: 70px;
      }
    }

  </style>
</head>
<body>

  <div class="page-container">
    <!-- Text and buttons in center -->
    <div class="text-container" id="textContainer">
      <h1 id="question">Do you forgive me? 💔</h1>
      <div class="button-container">
        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No 😢</button>
      </div>
    </div>
  </div>

  <script>
    const question = document.getElementById("question");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const textContainer = document.getElementById("textContainer");
    let stage = 0;

    yesBtn.onclick = function() {
      question.innerText = "I love you bbe ❤️🥺";
      textContainer.querySelector('.button-container').style.display = "none";

      createImagesAroundText(6);
    };

    noBtn.onclick = function() {
      if (stage === 0) {
        question.innerText = "Are you sure? 😢";
        stage = 1;
      } else {
        question.innerText = "Please, think again 😢";
      }
    };

    function createImagesAroundText(count) {
      const images = [
        "https://raw.githubusercontent.com/Joshriel/forgive/main/WhatsApp%20Image%202026-03-31%20at%2010.23.07%20(1).jpeg",
        "https://i.imgur.com/jQ9XQ0P.png",
        "https://i.imgur.com/Z7AzH2c.png"
      ];

      const containerRect = textContainer.getBoundingClientRect();

      for (let i = 0; i < count; i++) {
        const img = document.createElement("img");
        img.src = images[Math.floor(Math.random() * images.length)];
        img.className = "float-img";

        // Random position around text container
        let x = containerRect.left + Math.random() * containerRect.width - containerRect.width/2 - 50;
        let y = containerRect.top + Math.random() * containerRect.height - containerRect.height/2 - 50;

        img.style.left = `${x}px`;
        img.style.top = `${y}px`;

        document.body.appendChild(img);
      }
    }
  </script>

</body>
</html>
