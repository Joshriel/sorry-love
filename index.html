<!DOCTYPE html>
<html>
<head>
  <title>Just one question...</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Poppins, sans-serif;
      background: linear-gradient(to bottom, #ffe6f0, #ffd6eb);
      overflow: hidden;
    }

    .page-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .text-container {
      position: relative;
      background: linear-gradient(to bottom, #ffe6f0, #ffd6eb);
      padding: 40px 60px;
      text-align: center;
      z-index: 10;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }

    h1 {
      color: #ff3385;
      font-size: 5em;
      margin: 0 0 30px 0;
    }

    .button-container {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    button {
      padding: 15px 30px;
      font-size: 50px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    #yesBtn { background-color: #4CAF50; color: white; }
    #yesBtn:hover { transform: scale(1.1); }
    #noBtn { background-color: #ff4d4d; color: white; }

    /* Full-page image grid using CSS Grid */
    .image-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: 1fr;
      z-index: 5;
    }

    .image-grid img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      margin: 0;
      border-radius: 0;
      opacity: 0;
      transition: opacity 0.6s ease-in;
    }

    /* Floating hearts */
    .heart {
      position: absolute;
      font-size: 30px;
      color: darkred;
      animation: floatUp 3s linear forwards;
      z-index: 20;
      pointer-events: none;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(1); opacity: 1; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }

    /* Mobile adjustments */
    @media (max-width: 600px) {
      h1 { font-size: 4em; margin-bottom: 20px; }
      button { font-size: 24px; padding: 12px 25px; }
      .image-grid { grid-template-columns: repeat(3, 1fr); }
    }

  </style>
</head>
<body>

  <div class="page-container" id="pageContainer">
    <div class="text-container" id="textContainer">
      <h1 id="question">Do you forgive me? 💔</h1>
      <div class="button-container">
        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No 😢</button>
      </div>
    </div>

    <div class="image-grid" id="imageGrid"></div>
  </div>

  <script>
    const question = document.getElementById("question");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const imageGrid = document.getElementById("imageGrid");
    const pageContainer = document.getElementById("pageContainer");

    const images = [
      "https://raw.githubusercontent.com/Joshriel/sorry-love/main/image1.jpeg",
      "https://raw.githubusercontent.com/Joshriel/sorry-love/main/image2.jpeg",
      "https://raw.githubusercontent.com/Joshriel/sorry-love/main/image3.jpeg",
      "https://raw.githubusercontent.com/Joshriel/sorry-love/main/image4.jpeg",
      "https://raw.githubusercontent.com/Joshriel/sorry-love/main/image5.jpeg",
      "https://raw.githubusercontent.com/Joshriel/sorry-love/main/image6.jpeg",
      "https://raw.githubusercontent.com/Joshriel/sorry-love/main/image7.jpeg",
      "https://raw.githubusercontent.com/Joshriel/sorry-love/main/image8.jpeg",
      "https://raw.githubusercontent.com/Joshriel/sorry-love/main/image9.jpeg",
      "https://raw.githubusercontent.com/Joshriel/sorry-love/main/image10.jpeg",
      "https://raw.githubusercontent.com/Joshriel/sorry-love/main/image11.jpeg"
    ];

    let stage = 0;

    yesBtn.onclick = function() {
      question.innerText = "I love you bbe ❤️🥺";
      document.querySelector('.button-container').style.display = "none";
      showHearts(20);
      fillImageGrid();
    };

    noBtn.onclick = function() {
      if (stage === 0) {
        question.innerText = "Are you sure? 😢";
        stage = 1;
      } else {
        question.innerText = "Please, think again 😢";
      }
    };

    function fillImageGrid() {
      imageGrid.innerHTML = ""; // clear previous images
      const totalImages = 9; // 3x3 grid
      let index = 0;

      for (let i = 0; i < totalImages; i++) {
        const img = document.createElement("img");
        img.src = images[Math.floor(Math.random() * images.length)];
        imageGrid.appendChild(img);

        // pop-in effect with stagger
        setTimeout(() => img.style.opacity = 1, index * 300);
        index++;
      }
    }

    function showHearts(count) {
      for (let i = 0; i < count; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerText = "❤️";

        // random position around text container
        const rect = document.getElementById("textContainer").getBoundingClientRect();
        heart.style.left = rect.left + Math.random() * rect.width + "px";
        heart.style.top = rect.top + Math.random() * rect.height + "px";

        heart.style.animationDuration = (2 + Math.random() * 2) + "s";
        pageContainer.appendChild(heart);

        setTimeout(() => heart.remove(), 4000);
      }
    }
  </script>

</body>
</html>
