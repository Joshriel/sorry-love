<!DOCTYPE html>
<html>
<head>
  <title>Just one question...</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Poppins, sans-serif;
      background: linear-gradient(to bottom, #ffe6f0, #ffd6eb);
      overflow: hidden;
    }

    .page-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .text-container {
      position: relative;
      background: linear-gradient(to bottom, #ffe6f0, #ffd6eb);
      padding: 40px 60px;
      border-radius: 20px;
      text-align: center;
      z-index: 10;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }

    h1 {
      color: #ff3385;
      font-size: 5.2em;
      margin: 0 0 30px 0;
    }

    .button-container {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    button {
      padding: 12px 25px;
      font-size: 50px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    #yesBtn {
      background-color: #4CAF50;
      color: white;
    }
    #yesBtn:hover { transform: scale(1.1); }

    #noBtn {
      background-color: #ff4d4d;
      color: white;
    }

    /* Carousel container for images */
    .carousel-container {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      max-width: 500px;
      height: 250px;
      transform: translate(-50%, -50%);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      z-index: 5;
      pointer-events: none; /* images not clickable */
    }

    .carousel-container img {
      width: 80px;
      height: 120px;
      object-fit: cover;
      border-radius: 10px;
      opacity: 0;
      transform: scale(0.5);
      transition: transform 0.5s ease, opacity 0.5s ease;
    }

    .carousel-container img.show {
      opacity: 1;
      transform: scale(1);
    }

    @media (max-width: 600px) {
      h1 { font-size: 5em; margin-bottom: 30px; }
      button { font-size: 28px; padding: 15px 30px; }
      .carousel-container { height: 180px; }
      .carousel-container img { width: 60px; height: 90px; }
    }

  </style>
</head>
<body>

  <div class="page-container">
    <div class="text-container" id="textContainer">
      <h1 id="question">Do you forgive me? 💔</h1>
      <div class="button-container">
        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No 😢</button>
      </div>
    </div>
    <div class="carousel-container" id="carousel"></div>
  </div>

  <script>
    const question = document.getElementById("question");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const carousel = document.getElementById("carousel");

    const images = [
      "https://raw.githubusercontent.com/Joshriel/forgive/main/WhatsApp%20Image%202026-03-31%20at%2010.23.07%20(1).jpeg",
      "https://i.imgur.com/jQ9XQ0P.png",
      "https://i.imgur.com/Z7AzH2c.png"
    ];

    let stage = 0;

    yesBtn.onclick = function() {
      question.innerText = "I love you bbe ❤️🥺";
      document.querySelector('.button-container').style.display = "none";

      startCarousel();
    };

    noBtn.onclick = function() {
      if (stage === 0) {
        question.innerText = "Are you sure? 😢";
        stage = 1;
      } else {
        question.innerText = "Please, think again 😢";
      }
    };

    function startCarousel() {
      let index = 0;
      const count = 5; // number of images visible
      for (let i = 0; i < count; i++) {
        const img = document.createElement("img");
        img.src = images[Math.floor(Math.random() * images.length)];
        carousel.appendChild(img);
      }

      const imgs = carousel.querySelectorAll("img");

      function showNext() {
        imgs.forEach(img => img.classList.remove("show"));
        imgs[index % imgs.length].classList.add("show");
        index++;
        setTimeout(showNext, 800); // every 0.8s
      }

      showNext();
    }

  </script>

</body>
</html>
